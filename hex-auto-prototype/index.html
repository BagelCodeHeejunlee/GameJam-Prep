<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>헥스 자동 전투 프로토타입</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <span>WAVE</span>
          <strong id="waveLabel">1</strong>
        </div>
        <div>
          <span>TURN</span>
          <strong id="turnLabel">1</strong>
        </div>
        <div>
          <span>ENEMY</span>
          <strong id="enemyLabel">0</strong>
        </div>
        <button id="restartButton" type="button" aria-label="다시 시작">↻</button>
      </header>

      <section class="board-panel">
        <div id="board" class="hex-board" aria-label="헥스 전투 보드"></div>
      </section>

      <section class="party-panel" aria-label="파티 상태">
        <article class="hero-card archer">
          <span class="hero-token">궁</span>
          <div>
            <strong>궁수</strong>
            <em id="archerStatus">이동2 · 공격1</em>
          </div>
        </article>
        <article class="hero-card warrior">
          <span class="hero-token">전</span>
          <div>
            <strong>전사</strong>
            <em id="warriorStatus">이동3 · 공격1</em>
          </div>
        </article>
        <article class="hero-card mage">
          <span class="hero-token">법</span>
          <div>
            <strong>마법사</strong>
            <em id="mageStatus">후퇴1 · 공격1</em>
          </div>
        </article>
      </section>

      <section class="info-panel">
        <div>
          <strong>선택한 성장</strong>
          <div id="upgradeChips" class="chips"></div>
        </div>
        <div>
          <strong>전투 로그</strong>
          <div id="battleLog" class="battle-log"></div>
        </div>
      </section>
    </main>

    <div id="rewardOverlay" class="overlay hidden">
      <section class="reward-modal">
        <span class="eyebrow">UPGRADE</span>
        <h1>성장 선택</h1>
        <div id="rewardChoices" class="reward-choices"></div>
      </section>
    </div>

    <div id="resultOverlay" class="overlay hidden">
      <section class="reward-modal compact">
        <span class="eyebrow">RESULT</span>
        <h1 id="resultTitle">결과</h1>
        <p id="resultText"></p>
        <button id="retryButton" type="button">다시 시작</button>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
