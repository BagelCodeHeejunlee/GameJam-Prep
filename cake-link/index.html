<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fff5e7" />
    <meta name="description" content="같은 조각 케이크 6개를 한 판에 모으는 4×4 케이크 정렬 퍼즐" />
    <meta property="og:title" content="케이크 링크" />
    <meta property="og:description" content="판을 놓고, 조각을 모아, 케이크를 완성하세요." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bagelcodeheejunlee.github.io/GameJam-Prep/cake-link/" />
    <meta property="og:image" content="https://bagelcodeheejunlee.github.io/GameJam-Prep/cake-link/og.png" />
    <title>케이크 링크</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="brand" aria-label="케이크 링크">
          <span class="brand-mark" aria-hidden="true">🍰</span>
          <div>
            <h1>케이크 링크</h1>
          </div>
        </div>

        <div class="top-actions">
          <button id="soundButton" class="icon-button" type="button" aria-label="소리 끄기" aria-pressed="true">♪</button>
          <button id="restartButton" class="soft-button" type="button">다시 시작</button>
        </div>
      </header>

      <section class="game-stage">
        <div id="board" class="board" role="grid" aria-label="4 곱하기 4 케이크 보드"></div>
      </section>

      <section class="tray-panel" aria-label="놓을 수 있는 케이크 판">
        <div class="tray-heading">
          <p id="boardHint">판을 위로 끌어 빈칸에 놓으세요</p>
          <div class="swap-count" title="판 교체 가능 횟수">
            <span aria-hidden="true">↻</span>
            <strong id="swapLabel">3</strong>
          </div>
        </div>
        <div id="rack" class="rack"></div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="resultOverlay" class="overlay hidden" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <section class="result-card">
        <span class="result-cake" aria-hidden="true">🍰</span>
        <span class="eyebrow">TODAY'S RESULT</span>
        <h2 id="resultTitle">진열대가 가득 찼어요</h2>
        <p>같은 조각이 만나도록 판을 더 가깝게 놓아보세요.</p>
        <div class="result-stats">
          <div><span>완성한 케이크</span><strong id="resultCompleted">0판</strong></div>
          <div><span>최종 점수</span><strong id="resultScore">0</strong></div>
        </div>
        <button id="retryButton" class="primary-button" type="button">한 번 더 만들기</button>
      </section>
    </div>

    <script src="engine.js"></script>
    <script src="app.js"></script>
  </body>
</html>
