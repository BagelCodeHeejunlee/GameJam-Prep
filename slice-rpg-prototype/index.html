<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Bento Blocks</title>
    <meta name="theme-color" content="#f8e8c8" />
    <link rel="stylesheet" href="styles.css?v=bento-meta-21" />
  </head>
  <body>
    <main class="app-shell meta-mode">
      <section id="metaScreen" class="meta-screen" aria-label="메타 화면">
        <header class="meta-resource-bar" aria-label="자원">
          <div class="resource-pill gold"><span>골드</span><strong id="goldLabel">12,400</strong></div>
          <div class="resource-pill gem"><span>보석</span><strong id="gemLabel">320</strong></div>
          <div class="resource-pill heart"><span>하트</span><strong id="staminaLabel">18/20</strong></div>
          <button id="metaSettingsButton" class="meta-icon-button" type="button" aria-label="설정">⚙</button>
        </header>

        <section id="metaContent" class="meta-content" aria-live="polite"></section>

        <nav class="meta-bottom-nav" aria-label="메인 메뉴">
          <button class="meta-tab" data-tab="summon" type="button"><i>✦</i><span>소환</span></button>
          <button class="meta-tab" data-tab="heroes" type="button"><i>●</i><span>영웅</span></button>
          <button class="meta-tab active" data-tab="main" type="button"><i>▦</i><span>메인</span></button>
          <button class="meta-tab" data-tab="dungeon" type="button"><i>◆</i><span>던전</span></button>
          <button class="meta-tab" data-tab="shop" type="button"><i>▣</i><span>상점</span></button>
        </nav>
      </section>

      <section class="fill-zone" aria-label="채우는 곳">
        <header class="top-bar">
          <div>
            <p class="eyebrow">BENTO BLOCKS</p>
            <h1>Bento Blocks</h1>
          </div>
          <button id="restartButton" class="icon-command" type="button" title="새 게임" aria-label="새 게임">↺</button>
        </header>

        <section class="status-strip" aria-label="전투 상태">
          <div>
            <span>진행</span>
            <strong id="stageLabel">W1/3 M1/2</strong>
          </div>
          <div>
            <span>체력</span>
            <strong id="hpLabel">24 / 24</strong>
          </div>
          <div>
            <span>재료</span>
            <strong id="materialLabel">20</strong>
          </div>
        </section>

        <section class="monster-section" aria-label="몬스터 퍼즐">
          <div id="actionCard" class="action-card" aria-live="polite"></div>
          <div id="waveTracker" class="wave-tracker" aria-label="웨이브 진행"></div>

          <div class="monster-head">
            <div>
              <p id="monsterSub" class="eyebrow">갑피를 먼저 막아라</p>
              <h2 id="monsterName">철갑 고블린</h2>
            </div>
            <div class="completion">
              <span id="completionLabel">0 / 16</span>
              <div class="completion-track"><i id="completionFill"></i></div>
            </div>
          </div>

          <div id="monsterGrid" class="monster-grid" aria-label="몬스터 몸체"></div>
        </section>
      </section>

      <section class="cut-zone" aria-label="자르는 곳">
        <section class="workbench" aria-label="자르기 작업대">
          <div class="section-head">
            <div>
              <p class="eyebrow">CUT BOARD</p>
              <h2>칼을 움직이고 자르기</h2>
            </div>
            <div class="tool-count"><span>조각</span><strong id="pieceCountLabel">1개</strong></div>
          </div>

          <div id="materialBoard" class="material-board" aria-label="재료와 칼이 놓인 격자판">
            <div id="materialGrid" class="material-grid" aria-label="재료판"></div>
            <div id="cutLayer" class="cut-layer" aria-hidden="true"></div>
            <div id="knifeLayer" class="knife-layer" aria-label="이동 가능한 칼"></div>
          </div>

          <section id="rewardTray" class="reward-tray hidden" aria-label="보상 작업대">
            <div class="reward-tray-head">
              <div>
                <p class="eyebrow">REWARD</p>
                <h2>보상을 판에 붙이기</h2>
              </div>
              <button id="rewardDoneButton" class="reward-done-button" type="button">완료</button>
            </div>
            <div id="rewardItems" class="reward-items"></div>
          </section>

          <div class="turn-controls" aria-label="턴 행동">
            <div class="control-chip hp-chip"><span>체력</span><strong id="hpControlLabel">24/24</strong></div>
            <div class="control-chip cuts-chip"><span>칼질</span><strong id="cutCountLabel">1/1</strong></div>
            <button id="cutButton" class="cut-button" type="button">자르기</button>
            <button id="newBoardButton" class="new-board-button" type="button">새 판</button>
            <button id="endTurnButton" class="end-turn-button" type="button">턴 종료</button>
          </div>
          <p id="knifeHint" class="knife-hint">칼은 격자선 사이를 움직입니다. 잘린 조각은 드래그해서 옮길 수 있습니다.</p>
        </section>
      </section>

      <section class="log-section" aria-label="전투 로그">
        <div class="section-head compact">
          <div>
            <p class="eyebrow">LOG</p>
            <h2>전투 기록</h2>
          </div>
        </div>
        <div id="battleLog" class="battle-log"></div>
      </section>

      <div id="overlay" class="overlay hidden" aria-live="polite">
        <section class="result-modal">
          <p id="resultEyebrow" class="eyebrow">STAGE CLEAR</p>
          <h2 id="resultTitle">몬스터 포장 완료</h2>
          <p id="resultText">결과를 확인합니다.</p>
          <div id="rewardChoices" class="reward-choices hidden" aria-label="보상 선택"></div>
          <button id="resultButton" class="primary" type="button">다음</button>
        </section>
      </div>
    </main>

    <div id="dragGhost" class="drag-ghost hidden" aria-hidden="true"></div>
    <script src="app.js?v=bento-meta-21"></script>
  </body>
</html>
