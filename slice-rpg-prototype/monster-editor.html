<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <title>Bento Blocks Monster Editor</title>
    <meta name="theme-color" content="#f8e8c8" />
    <link rel="stylesheet" href="monster-editor.css?v=monster-editor-4" />
  </head>
  <body>
    <main class="editor-shell">
      <header class="editor-top">
        <div>
          <p class="eyebrow">BENTO BLOCKS TOOL</p>
          <h1>몬스터 보드 편집기</h1>
        </div>
        <nav class="tool-links" aria-label="도구 링크">
          <a class="game-link" href="./index.html">게임으로</a>
          <a class="game-link" href="./stage-editor.html">스테이지 편집</a>
        </nav>
      </header>

      <section class="editor-layout">
        <aside class="monster-list-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">MONSTERS</p>
              <h2>몬스터 목록</h2>
            </div>
            <button id="resetButton" class="ghost-button" type="button">초기화</button>
          </div>
          <div id="monsterList" class="monster-list" aria-label="몬스터 목록"></div>
        </aside>

        <section class="editor-panel">
          <div class="panel-head editor-heading">
            <div>
              <p class="eyebrow" id="editModeLabel">BASE BOARD</p>
              <h2 id="editorTitle">몬스터 편집</h2>
            </div>
            <div class="editor-actions">
              <button id="saveButton" class="primary-button" type="button">저장</button>
              <button id="copyButton" class="ghost-button" type="button">JSON 복사</button>
            </div>
          </div>

          <div class="field-grid">
            <label>
              <span>이름</span>
              <input id="monsterNameInput" type="text" />
            </label>
            <label>
              <span>설명</span>
              <input id="monsterSubInput" type="text" />
            </label>
            <label>
              <span>가로</span>
              <input id="colsInput" min="1" max="8" type="number" />
            </label>
            <label>
              <span>세로</span>
              <input id="rowsInput" min="1" max="8" type="number" />
            </label>
            <label>
              <span>기본 공격</span>
              <input id="baseAttackInput" min="0" max="99" type="number" />
            </label>
          </div>

          <section class="level-panel">
            <div class="level-header">
              <div id="levelTabs" class="level-tabs" aria-label="보드 레벨 선택"></div>
              <button id="addLevelButton" class="ghost-button" type="button">레벨 추가</button>
            </div>
            <div id="levelFields" class="level-fields"></div>
          </section>

          <section class="board-tools" aria-label="보드 도구">
            <button class="tool-button active" data-tool="body" type="button">칸</button>
            <button class="tool-button" data-tool="attack" type="button">공격</button>
            <button class="tool-button" data-tool="heal" type="button">회복</button>
            <button class="tool-button" data-tool="defense" type="button">방어</button>
            <button class="tool-button" data-tool="special" type="button">특수</button>
            <button class="tool-button" data-tool="clear" type="button">표식 제거</button>
            <button class="tool-button danger" data-tool="erase" type="button">삭제</button>
          </section>

          <section class="board-area">
            <div id="boardGrid" class="board-grid" aria-label="몬스터 보드"></div>
            <aside class="board-help">
              <strong id="boardSummary">0칸</strong>
              <p id="boardHelpText"></p>
            </aside>
          </section>
        </section>

        <aside class="json-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">EXPORT</p>
              <h2>편집 데이터</h2>
            </div>
            <button id="importButton" class="ghost-button" type="button">가져오기</button>
          </div>
          <textarea id="jsonOutput" spellcheck="false" aria-label="몬스터 JSON"></textarea>
        </aside>
      </section>
    </main>

    <script src="monster-editor.js?v=monster-editor-4"></script>
  </body>
</html>
