<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>GameJam Prep - Hex Auto Battle</title>
    <meta name="theme-color" content="#0a7d92" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Hex Battle" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/card-normal-v2.png" />
    <link rel="preload" as="image" href="assets/casual/bg-meadow.png?v=20260623-bg-image" />
    <link rel="preload" as="image" href="assets/casual/hex-grass.png?v=20260623-boulder-wall" />
    <link rel="preload" as="image" href="assets/casual/hex-stone.png?v=20260623-boulder-wall" />
    <link rel="preload" as="image" href="assets/casual/hex-earth.png" />
    <link rel="preload" as="image" href="assets/casual/hud-panel.png" />
    <link rel="preload" as="image" href="assets/casual/button-pill.png" />
    <link rel="preload" as="image" href="assets/casual/hud-token.png" />
    <link rel="preload" as="image" href="assets/casting/archer/archer-01-2d-illustration-cutout.png" />
    <link rel="preload" as="image" href="assets/characters/archer-token/archer-token-v2-front.png" />
    <link rel="stylesheet" href="styles.css?v=20260624-three-card-fit" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar">
        <div>
          <h1 id="gameTitle">오토배틀 프로토타입</h1>
          <p id="runSummary">웨이브 1 / 턴 0</p>
        </div>
        <div class="controls">
          <a class="tool-link" href="cards.html">카드툴</a>
          <a class="tool-link" href="grass-tile-casting-board.html">타일시안</a>
          <button id="newRunButton" type="button">새 런</button>
          <button id="pauseButton" type="button">일시정지</button>
          <button id="speedButton" type="button">x1</button>
        </div>
      </section>

      <section class="game-layout">
        <section class="board-panel">
          <div class="resource-hud" aria-label="전투 자원">
            <div class="resource-item" data-resource="charge">
              <span>차지</span>
              <strong id="chargeHud">0</strong>
            </div>
            <div class="resource-item" data-resource="deck">
              <span>덱</span>
              <strong id="deckCount">10</strong>
            </div>
            <div class="resource-item" data-resource="discard">
              <span>버림</span>
              <strong id="discardCount">0</strong>
            </div>
          </div>
          <div id="board" class="board" aria-label="hex battle board"></div>
        </section>

        <section class="battle-top-hud" aria-label="전투 상단 정보">
          <section class="enemy-summary-panel" aria-label="적 요약">
            <div id="enemySummary" class="enemy-summary"></div>
          </section>
          <section class="priority-panel">
            <h2>실행 순서</h2>
            <div id="priorityStrip" class="priority-strip"></div>
          </section>
          <section id="enemyActionHud" class="enemy-action-hud" aria-label="적 행동 카드" aria-live="polite"></section>
        </section>

        <section id="playerHud" class="player-hud" aria-label="플레이어 정보" aria-hidden="true"></section>
        <section id="turnPlanner" class="turn-planner hidden" aria-label="턴 계획"></section>

        <aside class="side-panel">
          <section class="stat-strip">
            <div>
              <span id="playerNameLabel">궁수</span>
              <strong id="playerHp">70 / 70</strong>
            </div>
            <div>
              <span>덱</span>
              <strong>10</strong>
            </div>
            <div>
              <span>버림</span>
              <strong>0</strong>
            </div>
            <div>
              <span>차지</span>
              <strong id="chargeCount">0</strong>
            </div>
          </section>

          <section class="draw-panel">
            <h2>순서</h2>
            <div id="drawnCards" class="drawn-cards"></div>
          </section>

          <section class="timeline-panel">
            <h2>실행 순서</h2>
            <ol id="timeline" class="timeline"></ol>
          </section>

          <section class="log-panel">
            <h2>전투 로그</h2>
            <div id="battleLog" class="battle-log"></div>
          </section>
        </aside>
      </section>

      <div id="drawnCardReveal" class="drawn-reveal" aria-live="polite"></div>
      <div id="turnScrim" class="turn-scrim" aria-hidden="true"></div>
      <div id="turnStart" class="turn-start" aria-hidden="true"></div>
      <div id="turnCue" class="turn-cue" aria-live="polite"></div>
    </main>

    <div id="rewardOverlay" class="overlay reward-overlay hidden">
      <div class="reward-stage">
        <div class="reward-banner">
          <span class="reward-eyebrow">WAVE CLEAR</span>
          <h2 class="reward-title">전투 승리!</h2>
          <p id="rewardInstr" class="reward-instr">획득할 카드 <b>1장</b>을 선택하세요</p>
        </div>
        <div id="rewardCards" class="reward-cards"></div>
      </div>
    </div>

    <div id="iconHelpOverlay" class="overlay hidden">
      <section class="help-modal">
        <div class="reward-header">
          <h2 id="iconHelpTitle">아이콘 설명</h2>
          <button id="closeHelpButton" class="icon-button" type="button" aria-label="닫기">x</button>
        </div>
        <div id="iconHelpList" class="icon-help-list"></div>
      </section>
    </div>

    <div id="cardPreviewOverlay" class="overlay card-preview-overlay hidden">
      <section class="card-preview-stage" role="dialog" aria-modal="true" aria-label="카드 확대">
        <button id="closeCardPreviewButton" class="icon-button card-preview-close" type="button" aria-label="닫기">x</button>
        <div id="cardPreviewMount" class="card-preview-mount"></div>
      </section>
    </div>

    <script src="app.js?v=20260624-stable-swap-range"></script>
  </body>
</html>
