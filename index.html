<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GameJam Prep - Hex Auto Battle</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar">
        <div>
          <h1>궁수 오토배틀 프로토타입</h1>
          <p id="runSummary">웨이브 1 / 턴 0</p>
        </div>
        <div class="controls">
          <button id="newRunButton" type="button">새 런</button>
          <button id="pauseButton" type="button">일시정지</button>
        </div>
      </section>

      <section class="game-layout">
        <section class="board-panel">
          <div id="board" class="board" aria-label="hex battle board"></div>
        </section>

        <aside class="side-panel">
          <section class="stat-strip">
            <div>
              <span>궁수</span>
              <strong id="playerHp">70 / 70</strong>
            </div>
            <div>
              <span>덱</span>
              <strong id="deckCount">10</strong>
            </div>
            <div>
              <span>버림</span>
              <strong id="discardCount">0</strong>
            </div>
          </section>

          <section class="draw-panel">
            <h2>순서</h2>
            <div id="drawnCards" class="drawn-cards"></div>
          </section>

          <section class="timeline-panel">
            <h2>우선권</h2>
            <ol id="timeline" class="timeline"></ol>
          </section>

          <section class="log-panel">
            <h2>전투 로그</h2>
            <div id="battleLog" class="battle-log"></div>
          </section>
        </aside>
      </section>
    </main>

    <div id="cardRevealOverlay" class="card-reveal-overlay hidden" aria-live="polite">
      <section class="card-reveal-stage">
        <p id="cardRevealTitle" class="card-reveal-title">카드 드로우</p>
        <div id="cardRevealList" class="card-reveal-list"></div>
      </section>
    </div>

    <div id="rewardOverlay" class="overlay hidden">
      <section class="reward-modal">
        <div class="reward-header">
          <div>
            <h2>웨이브 클리어</h2>
            <p>보상 카드 1장을 선택</p>
          </div>
          <button id="iconHelpButton" class="icon-button" type="button" aria-label="아이콘 설명">?</button>
        </div>
        <div id="rewardCards" class="reward-cards"></div>
      </section>
    </div>

    <div id="iconHelpOverlay" class="overlay hidden">
      <section class="help-modal">
        <div class="reward-header">
          <h2>아이콘 설명</h2>
          <button id="closeHelpButton" class="icon-button" type="button" aria-label="닫기">x</button>
        </div>
        <dl class="icon-help-list">
          <dt>ATK</dt>
          <dd>기본 공격력에 곱하는 공격 배수</dd>
          <dt>RNG</dt>
          <dd>공격 가능한 사거리</dd>
          <dt>MOV</dt>
          <dd>이동 칸 수</dd>
          <dt>TGT</dt>
          <dd>동시에 공격 가능한 타겟 수</dd>
          <dt>PRI</dt>
          <dd>우선권. 숫자가 낮을수록 먼저 발동</dd>
        </dl>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
