<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Core Rush</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="game-app">
      <header class="game-header">
        <div>
          <p class="eyebrow">Auto action defense</p>
          <h1>Core Rush</h1>
        </div>
        <button id="restartButton" class="ghost-button" type="button">재시작</button>
      </header>

      <main class="play-shell">
        <section class="arena-panel">
          <div class="hud">
            <div class="hud-item">
              <span>CORE</span>
              <div class="bar"><i id="coreBar"></i></div>
              <b id="coreText">100/100</b>
            </div>
            <div class="hud-item">
              <span>HERO</span>
              <div class="bar hero"><i id="heroBar"></i></div>
              <b id="heroText">100/100</b>
            </div>
            <div class="hud-stat">
              <span>WAVE</span>
              <b id="waveText">1</b>
            </div>
            <div class="hud-stat">
              <span>LV</span>
              <b id="levelText">1</b>
            </div>
          </div>

          <div class="canvas-wrap" id="touchSurface">
            <canvas id="gameCanvas" aria-label="Core Rush game field"></canvas>
            <div class="vignette"></div>
            <div class="xp-track"><i id="xpBar"></i></div>
            <div class="float-status">
              <span id="timerText">00:00</span>
              <span id="killText">0 KOs</span>
            </div>
            <div class="joystick" id="joystick">
              <i id="stick"></i>
            </div>
          </div>
        </section>

        <aside class="side-panel">
          <div class="mission-card">
            <span class="label">BUILD</span>
            <h2 id="buildTitle">루키 레인저</h2>
            <p id="buildText">자동 사격 · 코어 방어 · 웨이브 생존</p>
          </div>
          <div class="perk-list" id="perkList"></div>
        </aside>
      </main>

      <div id="startOverlay" class="overlay">
        <div class="modal">
          <span class="label">DEFENSE RUN</span>
          <h2>코어를 지켜라</h2>
          <p>이동과 전투가 자동으로 굴러간다. 드래그로 개입하고, 웨이브마다 공격/이동 방식을 바꾼다.</p>
          <button id="startButton" class="primary-button" type="button">출격</button>
        </div>
      </div>

      <div id="upgradeOverlay" class="overlay hidden">
        <div class="modal wide">
          <span class="label">LEVEL UP</span>
          <h2>강화 선택</h2>
          <div id="upgradeChoices" class="upgrade-grid"></div>
        </div>
      </div>

      <div id="gameOverOverlay" class="overlay hidden">
        <div class="modal">
          <span class="label">RUN ENDED</span>
          <h2 id="gameOverTitle">방어 실패</h2>
          <p id="gameOverText">00:00 · 0 KOs</p>
          <button id="againButton" class="primary-button" type="button">다시 출격</button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
