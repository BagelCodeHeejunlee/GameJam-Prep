<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Rotation Keepers</title>
    <meta name="theme-color" content="#101522" />
    <link rel="stylesheet" href="styles.css?v=stage3-roles-20260706-1" />
  </head>
  <body>
    <main class="game-shell" aria-label="Rotation Keepers">
      <section id="metaScreen" class="meta-screen" aria-label="메타 성장">
        <header class="meta-topbar" aria-label="보유 재화">
          <div class="meta-profile">
            <span>KEEPER</span>
            <strong id="metaAccountLevel">Lv.1</strong>
          </div>
          <div class="meta-currency-strip">
            <div><span>GOLD</span><strong id="metaGold">0</strong></div>
            <div><span>EXP</span><strong id="metaHeroXp">0</strong></div>
            <div><span>STONE</span><strong id="metaStone">0</strong></div>
          </div>
        </header>

        <section id="metaContent" class="meta-content" aria-live="polite"></section>

        <nav class="meta-nav" aria-label="메타 메뉴">
          <button class="meta-nav-button active" type="button" data-meta-tab="battle">
            <span>◆</span>
            <strong>전투</strong>
          </button>
          <button class="meta-nav-button" type="button" data-meta-tab="heroes">
            <span>●</span>
            <strong>영웅</strong>
          </button>
          <button class="meta-nav-button" type="button" data-meta-tab="growth">
            <span>▲</span>
            <strong>성장</strong>
          </button>
          <button class="meta-nav-button" type="button" data-meta-tab="bag">
            <span>■</span>
            <strong>가방</strong>
          </button>
        </nav>
      </section>

      <header class="hud hud-top">
        <section class="hud-cluster" aria-label="전투 상태">
          <div class="stat">
            <span>WAVE</span>
            <strong id="waveLabel">1/8</strong>
          </div>
          <div class="stat wide">
            <span>TOWER</span>
            <strong id="hpLabel">180/180</strong>
            <i class="bar"><b id="hpFill"></b></i>
          </div>
          <div class="stat wide">
            <span>EXP</span>
            <strong id="xpLabel">0/24</strong>
            <i class="bar xp"><b id="xpFill"></b></i>
          </div>
        </section>
      </header>

      <section id="battleFrame" class="battle-frame" aria-label="전장">
        <canvas id="gameCanvas"></canvas>
        <div id="toast" class="toast hidden" aria-live="polite"></div>
        <div id="bossBanner" class="boss-banner hidden" aria-live="polite">
          <span id="bossBannerKicker">WARNING</span>
          <strong id="bossBannerTitle">BOSS</strong>
          <em id="bossBannerText">거대한 적이 접근합니다</em>
        </div>
      </section>

      <footer class="hud hud-bottom">
        <section class="hero-panel" aria-label="출전 캐릭터">
          <div class="hero-copy">
            <p>출전 파티</p>
            <h1 id="heroLevelLabel">Lv.1 / TRI-KEEPERS</h1>
          </div>
          <div id="teamList" class="team-list" aria-label="저격수 전사 마법사"></div>
          <div class="hero-stats">
            <div><span>PWR</span><strong id="damageLabel">118</strong></div>
            <div><span>KILL</span><strong id="rangeLabel">0</strong></div>
          </div>
          <button id="restartButton" class="icon-button" type="button" aria-label="재시작" title="재시작">↻</button>
        </section>
      </footer>

      <section id="upgradeOverlay" class="overlay upgrade-overlay hidden" aria-label="레벨 업">
        <div class="modal">
          <p id="choiceEyebrow" class="eyebrow">LEVEL UP</p>
          <h2 id="choiceTitle">강화 선택</h2>
          <div id="upgradeChoices" class="upgrade-choices"></div>
          <div id="rewardReveal" class="reward-reveal hidden"></div>
          <button id="rewardContinueButton" class="primary-button hidden" type="button">전투 계속</button>
        </div>
      </section>

      <section id="resultOverlay" class="overlay hidden" aria-label="결과">
        <div class="modal compact">
          <p id="resultEyebrow" class="eyebrow">RESULT</p>
          <h2 id="resultTitle">전투 종료</h2>
          <p id="resultText">결과를 확인합니다.</p>
          <button id="resultButton" class="primary-button" type="button">로비로</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=stage3-roles-20260706-1"></script>
  </body>
</html>
