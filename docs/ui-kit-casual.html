<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Casual Fantasy UI Kit</title>
    <style>
      :root {
        color-scheme: light;
        --sky: #50c8e8;
        --deep-teal: #0d6f87;
        --teal: #1495aa;
        --cream: #fff4dc;
        --cream-2: #f9ddb0;
        --paper: #fff9ea;
        --ink: #402817;
        --muted: #826044;
        --wood: #9b6731;
        --wood-dark: #5f391e;
        --gold: #ffc83d;
        --gold-dark: #dd7c18;
        --blue: #40c8ef;
        --blue-dark: #117ca6;
        --red: #f16852;
        --red-dark: #b9382f;
        --green: #63c34a;
        --shadow: rgba(73, 45, 20, 0.2);
        --card-font: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-width: 320px;
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow-x: hidden;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          linear-gradient(rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.06)),
          url("../assets/casual/bg-meadow.png") center / cover fixed no-repeat,
          #72d1ec;
      }

      button,
      a {
        font: inherit;
      }

      .kit-shell {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: max(18px, env(safe-area-inset-top)) clamp(14px, 3vw, 30px)
          max(26px, env(safe-area-inset-bottom));
      }

      .kit-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .kit-title {
        display: grid;
        gap: 3px;
      }

      .kit-title span {
        color: rgba(255, 249, 224, 0.84);
        font-size: 12px;
        font-weight: 900;
        text-shadow: 0 2px 0 rgba(42, 85, 67, 0.25);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        color: #fff8dc;
        font-size: clamp(28px, 5vw, 48px);
        font-weight: 950;
        line-height: 1;
        text-shadow:
          0 3px 0 rgba(70, 49, 20, 0.28),
          0 8px 22px rgba(10, 86, 100, 0.24);
      }

      h2 {
        color: #fff6d7;
        font-size: 22px;
        font-weight: 950;
        text-shadow: 0 2px 0 rgba(91, 58, 23, 0.28);
      }

      h3 {
        color: #6e4322;
        font-size: 15px;
        font-weight: 950;
      }

      .battle-link {
        display: inline-grid;
        min-height: 38px;
        place-items: center;
        padding: 8px 15px;
        border: 2px solid rgba(255, 255, 255, 0.52);
        border-radius: 999px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0)),
          linear-gradient(#37c8ed, #0f82ac);
        color: #fff8df;
        font-size: 13px;
        font-weight: 950;
        text-decoration: none;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.34),
          0 8px 18px rgba(14, 88, 104, 0.24);
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
      }

      .kit-grid {
        display: grid;
        grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
        gap: 22px;
        width: 100%;
        align-items: start;
      }

      .phone-frame {
        position: sticky;
        top: 18px;
        width: min(100%, 430px);
        overflow: hidden;
        min-height: 820px;
        border: 9px solid #17313b;
        border-radius: 38px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.08), transparent 18%),
          url("../assets/casual/bg-meadow.png") center / cover no-repeat;
        box-shadow:
          inset 0 0 0 2px rgba(255, 255, 255, 0.2),
          0 30px 70px rgba(16, 61, 68, 0.32);
      }

      .phone-safe {
        position: relative;
        min-height: 820px;
        padding: 14px 13px 16px;
      }

      .hud-row {
        position: relative;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .hud-pill {
        display: inline-grid;
        min-height: 42px;
        place-items: center;
        padding: 8px 14px;
        border: 2px solid rgba(255, 255, 255, 0.48);
        border-radius: 999px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.2), transparent 48%),
          linear-gradient(#197f98, #0b6075);
        color: #fff9df;
        font-size: 16px;
        font-weight: 950;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.28),
          0 7px 14px rgba(5, 68, 83, 0.24);
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.22);
        white-space: nowrap;
      }

      .icon-row {
        display: flex;
        gap: 7px;
      }

      .icon-button {
        position: relative;
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border: 2px solid rgba(255, 255, 255, 0.48);
        border-radius: 999px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0) 45%),
          linear-gradient(#47d5f4, #1284af);
        color: #fff8df;
        font-size: 16px;
        font-weight: 950;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.34),
          0 7px 15px rgba(7, 80, 98, 0.22);
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
      }

      .icon-button.pause::before,
      .icon-button.pause::after {
        content: "";
        width: 5px;
        height: 18px;
        border-radius: 2px;
        background: currentColor;
        box-shadow: 0 2px 0 rgba(54, 38, 16, 0.18);
      }

      .icon-button.pause {
        grid-template-columns: 5px 5px;
        gap: 6px;
      }

      .icon-button.play::before {
        content: "";
        width: 0;
        height: 0;
        margin-left: 3px;
        border-top: 11px solid transparent;
        border-bottom: 11px solid transparent;
        border-left: 17px solid currentColor;
      }

      .icon-button.close {
        background:
          linear-gradient(rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0) 45%),
          linear-gradient(#ff806a, #d24635);
      }

      .board-stage {
        position: relative;
        z-index: 1;
        display: grid;
        min-height: 435px;
        margin: 16px -2px 0;
        place-items: end center;
        overflow: hidden;
        border-radius: 22px;
      }

      .board-stage::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(80% 55% at 50% 55%, rgba(255, 252, 166, 0.28), transparent 60%),
          url("../assets/ui-kit/board-meadow-panel-v1.png") center / cover no-repeat;
        filter: saturate(1.04);
      }

      .board-stage::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(transparent 64%, rgba(10, 84, 93, 0.54));
        pointer-events: none;
      }

      .hex-marker {
        position: absolute;
        z-index: 2;
        display: grid;
        width: 54px;
        height: 48px;
        place-items: center;
        clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%);
        border: 0;
        background:
          linear-gradient(rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0.06)),
          linear-gradient(#57d6ff, #1085bf);
        box-shadow:
          inset 0 0 0 4px rgba(255, 255, 255, 0.42),
          0 8px 14px rgba(20, 80, 82, 0.22);
      }

      .hex-marker.enemy {
        background:
          linear-gradient(rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.04)),
          linear-gradient(#ff8d6a, #d74a35);
      }

      .hex-marker.one {
        left: 56px;
        top: 184px;
      }

      .hex-marker.two {
        right: 82px;
        top: 124px;
      }

      .hex-marker.three {
        left: 178px;
        bottom: 84px;
      }

      .reward-popup {
        position: relative;
        z-index: 5;
        display: grid;
        gap: 11px;
        width: min(100%, 358px);
        margin: -38px auto 0;
        padding: 15px 15px 14px;
        border: 3px solid #f1bd58;
        border-radius: 22px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.08) 28%),
          linear-gradient(#fff8e5, #f5dcae);
        box-shadow:
          inset 0 0 0 2px rgba(109, 73, 29, 0.18),
          0 16px 34px rgba(54, 34, 14, 0.24);
      }

      .popup-title {
        display: grid;
        justify-items: center;
        gap: 3px;
        text-align: center;
      }

      .popup-title span {
        color: #af6d22;
        font-size: 11px;
        font-weight: 950;
      }

      .popup-title strong {
        color: #633b1d;
        font-family: var(--card-font);
        font-size: 24px;
        font-weight: 950;
        line-height: 1;
      }

      .reward-slots {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .mini-card {
        display: grid;
        min-height: 104px;
        align-content: space-between;
        justify-items: center;
        padding: 8px 5px;
        border: 2px solid rgba(117, 74, 31, 0.28);
        border-radius: 9px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.56), transparent 42%),
          linear-gradient(#fff3c8, #f5bf64);
        box-shadow:
          inset 0 0 0 2px rgba(255, 255, 255, 0.32),
          0 7px 12px rgba(98, 57, 18, 0.12);
      }

      .mini-card:nth-child(2) {
        background:
          linear-gradient(rgba(255, 255, 255, 0.56), transparent 42%),
          linear-gradient(#dff7ff, #74ccf1);
      }

      .mini-card:nth-child(3) {
        background:
          linear-gradient(rgba(255, 255, 255, 0.56), transparent 42%),
          linear-gradient(#ffe3d7, #ef7860);
      }

      .mini-card:nth-child(4) {
        background:
          linear-gradient(rgba(255, 255, 255, 0.56), transparent 42%),
          linear-gradient(#e9dcff, #a485ed);
      }

      .mini-card i {
        display: block;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background:
          radial-gradient(circle at 36% 28%, #fff, rgba(255, 255, 255, 0.25) 32%, transparent 34%),
          linear-gradient(#36c77a, #138d73);
        box-shadow: 0 4px 8px rgba(69, 42, 16, 0.18);
      }

      .mini-card strong {
        color: #553217;
        font-size: 13px;
        font-weight: 950;
      }

      .bottom-hud {
        position: absolute;
        right: 13px;
        bottom: 14px;
        left: 13px;
        z-index: 3;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .hero-panel {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        min-height: 74px;
        padding: 9px 12px;
        border: 3px solid #e0ab57;
        border-radius: 18px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0.08) 42%),
          linear-gradient(#fff5db, #f0cc8c);
        box-shadow:
          inset 0 0 0 2px rgba(255, 255, 255, 0.22),
          0 10px 20px rgba(55, 33, 14, 0.2);
      }

      .portrait-dot {
        width: 52px;
        height: 52px;
        border: 3px solid #41d1f3;
        border-radius: 16px;
        background:
          radial-gradient(circle at 50% 36%, #fff6bd 0 18%, transparent 19%),
          linear-gradient(#63c87a, #258d69);
        box-shadow:
          inset 0 0 0 2px rgba(255, 255, 255, 0.46),
          0 5px 10px rgba(44, 69, 38, 0.2);
      }

      .hero-copy {
        display: grid;
        gap: 7px;
        min-width: 0;
      }

      .hero-copy strong {
        color: #5a3417;
        font-size: 17px;
        font-weight: 950;
      }

      .hp-line {
        overflow: hidden;
        height: 11px;
        border: 2px solid #6a431d;
        border-radius: 999px;
        background: #fff1bd;
      }

      .hp-line span {
        display: block;
        width: 76%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(#85e95a, #32b63f);
      }

      .component-stack {
        display: grid;
        gap: 18px;
        min-width: 0;
      }

      .kit-band {
        display: grid;
        gap: 13px;
        padding: 17px;
        border: 3px solid rgba(255, 242, 207, 0.62);
        border-radius: 22px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.1)),
          rgba(21, 122, 139, 0.74);
        box-shadow:
          inset 0 0 0 2px rgba(50, 94, 72, 0.12),
          0 18px 40px rgba(19, 83, 94, 0.22);
      }

      .kit-band.light {
        border-color: rgba(144, 92, 36, 0.2);
        background:
          linear-gradient(rgba(255, 255, 255, 0.54), rgba(255, 255, 255, 0.18)),
          #fff2d3;
      }

      .button-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .fantasy-button {
        position: relative;
        display: inline-grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 9px 17px;
        border: 3px solid rgba(123, 73, 24, 0.42);
        border-radius: 999px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.42), transparent 44%),
          linear-gradient(var(--btn-top), var(--btn-bottom));
        color: var(--btn-ink);
        font-size: 16px;
        font-weight: 950;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.5),
          inset 0 -4px 0 rgba(93, 53, 16, 0.16),
          0 9px 16px rgba(80, 48, 17, 0.18);
        text-align: center;
        text-shadow: 0 1px 0 rgba(255, 252, 223, 0.62);
      }

      .fantasy-button.primary {
        --btn-top: #ffd94d;
        --btn-bottom: #f39b1f;
        --btn-ink: #633412;
      }

      .fantasy-button.secondary {
        --btn-top: #49d7f4;
        --btn-bottom: #147fa8;
        --btn-ink: #fff8df;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.18);
      }

      .fantasy-button.danger {
        --btn-top: #ff806b;
        --btn-bottom: #d34232;
        --btn-ink: #fff7e2;
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.16);
      }

      .fantasy-button.disabled {
        --btn-top: #fff3d8;
        --btn-bottom: #d6b98e;
        --btn-ink: #9a7655;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.44),
          inset 0 -4px 0 rgba(93, 53, 16, 0.08);
      }

      .button-glyph {
        display: grid;
        width: 27px;
        height: 27px;
        place-items: center;
        border-radius: 999px;
        background:
          radial-gradient(circle at 35% 28%, #fff, rgba(255, 255, 255, 0.2) 33%, transparent 35%),
          rgba(255, 255, 255, 0.28);
        box-shadow: inset 0 0 0 2px rgba(96, 56, 18, 0.16);
      }

      .button-glyph.bolt::before,
      .button-glyph.shield::before,
      .button-glyph.x::before {
        content: "";
        display: block;
      }

      .button-glyph.bolt::before {
        width: 11px;
        height: 20px;
        clip-path: polygon(58% 0, 18% 50%, 48% 50%, 34% 100%, 84% 38%, 54% 38%);
        background: currentColor;
      }

      .button-glyph.shield::before {
        width: 16px;
        height: 18px;
        clip-path: polygon(50% 0, 92% 16%, 82% 70%, 50% 100%, 18% 70%, 8% 16%);
        background: currentColor;
      }

      .button-glyph.x::before {
        width: 16px;
        height: 16px;
        background:
          linear-gradient(45deg, transparent 42%, currentColor 43% 57%, transparent 58%),
          linear-gradient(-45deg, transparent 42%, currentColor 43% 57%, transparent 58%);
      }

      .chip-row,
      .round-row {
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
      }

      .stat-chip {
        display: inline-grid;
        grid-template-columns: auto auto;
        gap: 7px;
        align-items: center;
        min-height: 34px;
        padding: 6px 12px;
        border: 2px solid rgba(108, 70, 31, 0.2);
        border-radius: 999px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.48), transparent 50%),
          linear-gradient(#fff6dc, #efcb8b);
        color: #603915;
        font-weight: 950;
        box-shadow: 0 6px 12px rgba(78, 47, 18, 0.12);
      }

      .chip-dot {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: linear-gradient(#ff6f5f, #c94232);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.4),
          0 2px 4px rgba(76, 43, 17, 0.16);
      }

      .chip-dot.blue {
        background: linear-gradient(#50d8ff, #1683b3);
      }

      .chip-dot.gold {
        background: linear-gradient(#ffd74d, #f29b1e);
      }

      .chip-dot.green {
        background: linear-gradient(#86dc5c, #2ba943);
      }

      .dialog-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(260px, 0.75fr);
        gap: 14px;
      }

      .sample-popup {
        position: relative;
        display: grid;
        gap: 13px;
        padding: 18px;
        border: 3px solid #d99746;
        border-radius: 20px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.1) 36%),
          linear-gradient(#fff7df, #f3d2a0);
        box-shadow:
          inset 0 0 0 2px rgba(119, 73, 25, 0.13),
          0 14px 30px rgba(67, 40, 15, 0.18);
      }

      .sample-popup .close {
        position: absolute;
        top: -14px;
        right: -14px;
        width: 38px;
        height: 38px;
      }

      .popup-copy {
        display: grid;
        gap: 7px;
      }

      .popup-copy strong {
        color: #5b3518;
        font-size: 23px;
        font-weight: 950;
      }

      .popup-copy p {
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.35;
      }

      .popup-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .popup-actions .fantasy-button,
      .sample-popup > .fantasy-button {
        width: 100%;
      }

      .popup-actions .fantasy-button {
        grid-template-columns: 1fr;
        min-height: 56px;
      }

      .toast {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px;
        align-items: center;
        min-height: 54px;
        padding: 10px 14px;
        border: 3px solid rgba(255, 245, 214, 0.52);
        border-radius: 999px;
        background:
          linear-gradient(rgba(255, 255, 255, 0.2), transparent 46%),
          linear-gradient(#1a819a, #0a6076);
        color: #fff8df;
        font-size: 15px;
        font-weight: 950;
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.26),
          0 12px 22px rgba(5, 69, 83, 0.22);
        text-shadow: 0 2px 0 rgba(0, 0, 0, 0.2);
      }

      .toast .chip-dot {
        width: 24px;
        height: 24px;
      }

      .board-asset {
        min-height: 220px;
        overflow: hidden;
        border: 4px solid rgba(255, 245, 214, 0.76);
        border-radius: 18px;
        background:
          radial-gradient(circle at 50% 44%, rgba(255, 246, 133, 0.18), transparent 52%),
          url("../assets/ui-kit/board-meadow-panel-v1.png") center / cover no-repeat;
        box-shadow:
          inset 0 0 0 2px rgba(109, 73, 29, 0.14),
          0 12px 28px rgba(52, 72, 30, 0.18);
      }

      .concept-link {
        display: inline-grid;
        width: fit-content;
        min-height: 38px;
        place-items: center;
        padding: 8px 13px;
        border-radius: 999px;
        background: rgba(255, 248, 222, 0.2);
        color: #fff8df;
        font-size: 13px;
        font-weight: 900;
        text-decoration: none;
      }

      @media (max-width: 980px) {
        .kit-grid {
          grid-template-columns: 1fr;
        }

        .phone-frame {
          position: relative;
          top: auto;
          width: min(100%, 430px);
          max-width: 430px;
          margin: 0 auto;
        }

        .dialog-row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 520px) {
        .kit-shell {
          padding-inline: 10px;
        }

        .kit-top {
          align-items: flex-start;
          flex-direction: column;
        }

        .phone-frame {
          width: 100vw;
          max-width: none;
          margin-right: -10px;
          margin-left: -10px;
          min-height: 760px;
          border-right-width: 0;
          border-left-width: 0;
          border-width: 6px;
          border-right-width: 0;
          border-left-width: 0;
          border-radius: 0;
        }

        .phone-safe {
          min-height: 760px;
          padding: 11px 10px 13px;
        }

        .hud-pill {
          min-height: 38px;
          padding: 7px 11px;
          font-size: 14px;
        }

        .icon-button {
          width: 39px;
          height: 39px;
        }

        .board-stage {
          min-height: 385px;
        }

        .reward-popup {
          padding: 13px 12px 12px;
        }

        .reward-slots {
          gap: 6px;
        }

        .mini-card {
          min-height: 94px;
        }

        .bottom-hud {
          grid-template-columns: 1fr;
        }

        .button-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="kit-shell">
      <header class="kit-top">
        <div class="kit-title">
          <span>UI SET 01</span>
          <h1>밝은 판타지 전투 UI</h1>
        </div>
        <a class="battle-link" href="../index.html">전투 화면으로</a>
      </header>

      <section class="kit-grid" aria-label="UI 키트">
        <section class="phone-frame" aria-label="모바일 화면 미리보기">
          <div class="phone-safe">
            <div class="hud-row">
              <div class="hud-pill">웨이브 2 / 10</div>
              <div class="icon-row">
                <div class="icon-button pause" aria-hidden="true"></div>
                <div class="icon-button">x2</div>
              </div>
            </div>

            <div class="board-stage">
              <div class="hex-marker enemy one"></div>
              <div class="hex-marker enemy two"></div>
              <div class="hex-marker three"></div>
            </div>

            <section class="reward-popup" aria-label="보상 팝업">
              <div class="popup-title">
                <span>WAVE CLEAR</span>
                <strong>전투 승리!</strong>
              </div>
              <div class="reward-slots">
                <div class="mini-card">
                  <i></i>
                  <strong>공격</strong>
                </div>
                <div class="mini-card">
                  <i></i>
                  <strong>이동</strong>
                </div>
                <div class="mini-card">
                  <i></i>
                  <strong>함정</strong>
                </div>
                <div class="mini-card">
                  <i></i>
                  <strong>룬</strong>
                </div>
              </div>
              <button class="fantasy-button primary" type="button">
                <span class="button-glyph bolt"></span>
                <span>선택 완료</span>
              </button>
            </section>

            <div class="bottom-hud">
              <div class="hero-panel">
                <div class="portrait-dot"></div>
                <div class="hero-copy">
                  <strong>궁수</strong>
                  <div class="hp-line"><span></span></div>
                </div>
              </div>
              <button class="fantasy-button primary" type="button">
                <span class="button-glyph bolt"></span>
                <span>자동 스킬</span>
              </button>
            </div>
          </div>
        </section>

        <section class="component-stack" aria-label="컴포넌트 모음">
          <section class="kit-band">
            <h2>버튼</h2>
            <div class="button-grid">
              <button class="fantasy-button primary" type="button">
                <span class="button-glyph bolt"></span>
                <span>전투 시작</span>
              </button>
              <button class="fantasy-button secondary" type="button">
                <span class="button-glyph shield"></span>
                <span>카드 보기</span>
              </button>
              <button class="fantasy-button danger" type="button">
                <span class="button-glyph x"></span>
                <span>포기하기</span>
              </button>
              <button class="fantasy-button disabled" type="button">
                <span class="button-glyph shield"></span>
                <span>잠김</span>
              </button>
            </div>
            <div class="round-row">
              <div class="icon-button play" aria-hidden="true"></div>
              <div class="icon-button pause" aria-hidden="true"></div>
              <div class="icon-button">x2</div>
              <div class="icon-button close">X</div>
            </div>
          </section>

          <section class="kit-band light">
            <h3>상태 토큰 / HUD 칩</h3>
            <div class="chip-row">
              <div class="stat-chip"><span class="chip-dot"></span><span>HP 70</span></div>
              <div class="stat-chip"><span class="chip-dot blue"></span><span>덱 12</span></div>
              <div class="stat-chip"><span class="chip-dot gold"></span><span>골드 8</span></div>
              <div class="stat-chip"><span class="chip-dot green"></span><span>차지 3</span></div>
            </div>
          </section>

          <section class="kit-band">
            <h2>팝업</h2>
            <div class="dialog-row">
              <div class="sample-popup">
                <div class="popup-copy">
                  <strong>웨이브 클리어</strong>
                  <p>보상 카드를 고르고 다음 전투로 넘어가는 밝은 보상판 스타일.</p>
                </div>
                <div class="reward-slots">
                  <div class="mini-card">
                    <i></i>
                    <strong>연사</strong>
                  </div>
                  <div class="mini-card">
                    <i></i>
                    <strong>도약</strong>
                  </div>
                  <div class="mini-card">
                    <i></i>
                    <strong>회복</strong>
                  </div>
                  <div class="mini-card">
                    <i></i>
                    <strong>운석</strong>
                  </div>
                </div>
                <button class="fantasy-button primary" type="button">
                  <span class="button-glyph bolt"></span>
                  <span>이 카드 선택</span>
                </button>
              </div>

              <div class="sample-popup">
                <div class="icon-button close">X</div>
                <div class="popup-copy">
                  <strong>새 런 시작?</strong>
                  <p>위험하지 않은 확인창은 크림색 판에 청색/적색 버튼만으로 구분.</p>
                </div>
                <div class="popup-actions">
                  <button class="fantasy-button secondary" type="button">
                    <span>취소</span>
                  </button>
                  <button class="fantasy-button danger" type="button">
                    <span>새 런</span>
                  </button>
                </div>
              </div>
            </div>
            <div class="toast">
              <span class="chip-dot gold"></span>
              <span>우선권 12, 궁수가 먼저 행동합니다</span>
            </div>
          </section>

          <section class="kit-band light">
            <h3>보드 배경</h3>
            <div class="board-asset"></div>
            <a class="concept-link" href="ui-kit-casual-concept-v1.png">생성 컨셉 시트 보기</a>
          </section>
        </section>
      </section>
    </main>
  </body>
</html>
